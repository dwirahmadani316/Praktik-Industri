<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Sistem Absensi Kemenkes RS Makassar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet" />

  <link href="style.css" rel="stylesheet" />
</head>
<body class="bg-light-layout">

  <div class="split-cards-container">
    
    <div class="info-card-green d-none d-lg-flex flex-column justify-content-between p-5">
      <div class="inner-image-overlay-green"></div>
      
      <div class="position-relative z-1">
        <div class="d-flex align-items-center">
          <div class="kemenkes-inner-logo me-3">
            <img src="img/logo.png" alt="Logo Kemenkes" style="width: 50px; height: auto;">
          </div>
          <div>
            <h2 class="fw-bold mb-0 text-white">Kemenkes</h2>
            <h5 class="fw-semibold text-white opacity-75 mb-0">RS Makassar</h5>
          </div>
        </div>
      </div>
      
      <div class="position-relative z-1 text-white contact-inner-details">
        <div class="d-flex mb-3 align-items-start">
          <i class="fa-solid fa-location-dot mt-1 me-3 text-tosca"></i>
          <span>Jln. Metro Tanjung Bunga. Kawasan Center Point of Indonesia. Maccini Sombala. Tamalate. Makassar</span>
        </div>
        <div class="d-flex mb-3 align-items-center">
          <i class="fa-solid fa-phone me-3 text-tosca"></i>
          <span>Nomor</span>
        </div>
        <div class="d-flex mb-3 align-items-center">
          <i class="fa-solid fa-envelope me-3 text-tosca"></i>
          <span>Gmail</span>
        </div>
        <div class="d-flex align-items-center">
          <i class="fa-solid fa-globe me-3 text-tosca"></i>
          <span>Link</span>
        </div>
      </div>
    </div>

    <div class="login-card-white p-4 p-md-5">
      <div class="mb-4">
        <h4 class="fw-bold text-dark mb-1">Selamat Datang 👋</h4>
        <p class="text-muted small">Silakan masuk ke akun absensi magang Anda.</p>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="mb-3">
          <label for="loginEmail" class="form-label text-dark fw-bold small">Email</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="fa-regular fa-envelope text-muted"></i></span>
            <input type="email" class="form-control border-start-0 ps-1" id="loginEmail" placeholder="nama@kemenkes.go.id" required />
          </div>
        </div>

        <div class="mb-2">
          <label for="loginPassword" class="form-label text-dark fw-bold small">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
            <input type="password" class="form-control border-start-0 ps-1" id="loginPassword" placeholder="Masukkan password" required />
          </div>
        </div>

        <div class="text-end mb-4">
          <small class="text-muted">Lupa password? Hubungi admin.</small>
        </div>

        <button type="submit" id="btnLogin" class="btn btn-kemenkes w-100 py-2.5 fw-semibold shadow-sm">
          <i class="fa-solid fa-right-to-bracket me-2"></i>Masuk
        </button>
      </form>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
