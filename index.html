<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Sistem Absensi Magang</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <!-- SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet" />

  <!-- Custom CSS -->
    <link href="style.css" rel="stylesheet" />
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-card-header">
        <div class="login-icon"><i class="fa-solid fa-clipboard-user"></i></div>
        <h4 class="mb-1 fw-bold">Sistem Absensi Magang</h4>
        <p class="mb-0 small opacity-90">Masuk untuk melanjutkan ke akun Anda</p>
      </div>

      <div class="login-card-body">
        <form id="loginForm" autocomplete="off">
          <div class="mb-3">
            <label for="loginEmail" class="form-label">Email</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0"><i class="fa-regular fa-envelope text-muted"></i></span>
              <input type="email" class="form-control border-start-0" id="loginEmail" placeholder="nama@perusahaan.com" required />
            </div>
          </div>

          <div class="mb-2">
            <label for="loginPassword" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
              <input type="password" class="form-control border-start-0" id="loginPassword" placeholder="Masukkan password" required />
            </div>
          </div>

          <div class="text-end mb-3">
            <small class="text-muted">Lupa password? Hubungi admin.</small>
          </div>

          <button type="submit" id="btnLogin" class="btn btn-primary-app w-100">
            <i class="fa-solid fa-right-to-bracket me-2"></i>Masuk
          </button>
        </form>

        <hr class="my-4" />
        <p class="text-center text-muted small mb-0">
          Belum memiliki akun? Akun dibuat oleh admin melalui Firebase Authentication.
        </p>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Firebase (Compat SDK) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- App Scripts -->
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
