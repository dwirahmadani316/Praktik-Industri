<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Sistem Absensi Magang</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar app-navbar navbar-expand">
    <div class="container d-flex align-items-center justify-content-between py-2">
      <a class="navbar-brand" href="dashboard.html"><i class="fa-solid fa-clipboard-user"></i> Absensi Magang</a>
      <div class="d-flex align-items-center gap-2">
        <span class="nav-user-pill"><i class="fa-regular fa-user"></i> <span id="navUserName">...</span></span>
        <button id="btnLogout" class="btn btn-logout d-none d-md-inline-flex align-items-center gap-2">
          <i class="fa-solid fa-right-from-bracket"></i> Keluar
        </button>
        <button id="btnLogoutMobile" class="btn btn-logout d-md-none" title="Keluar">
          <i class="fa-solid fa-right-from-bracket"></i>
        </button>
      </div>
    </div>
  </nav>

  <main class="app-main">
    <div class="container">

      <!-- HEADING -->
      <div class="page-heading mb-4">
        <h4 class="mb-1">Halo, <span id="welcomeName">Pengguna</span> 👋</h4>
        <p class="text-muted mb-0">Hari ini, <span id="todayDateLabel">-</span></p>
      </div>

      <!-- STAT CARDS -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <div class="stat-card">
            <div class="stat-icon bg-hadir"><i class="fa-solid fa-circle-check"></i></div>
            <div><div class="stat-value" id="statHadir">0</div><div class="stat-label">Hadir</div></div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card">
            <div class="stat-icon bg-izin"><i class="fa-solid fa-file-pen"></i></div>
            <div><div class="stat-value" id="statIzin">0</div><div class="stat-label">Izin</div></div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card">
            <div class="stat-icon bg-sakit"><i class="fa-solid fa-suitcase-medical"></i></div>
            <div><div class="stat-value" id="statSakit">0</div><div class="stat-label">Sakit</div></div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card">
            <div class="stat-icon bg-alfa"><i class="fa-solid fa-circle-xmark"></i></div>
            <div><div class="stat-value" id="statAlfa">0</div><div class="stat-label">Alfa</div></div>
          </div>
        </div>
      </div>

      <!-- ABSEN HARI INI -->
      <div class="app-card mb-4">
        <div class="card-header">
          <span><i class="fa-regular fa-clock me-2 text-primary"></i>Absensi Hari Ini</span>
          <span id="todayStatusBadge"><span class="badge bg-secondary">Memuat...</span></span>
        </div>
        <div class="card-body">
          <div class="today-box">
            <div class="row g-3 align-items-center">
              <div class="col-6 col-md-3">
                <div class="today-label">Jam Masuk</div>
                <div class="today-time" id="todayJamMasuk">-</div>
              </div>
              <div class="col-6 col-md-3">
                <div class="today-label">Jam Pulang</div>
                <div class="today-time" id="todayJamPulang">-</div>
              </div>
              <div class="col-12 col-md-6 d-flex flex-wrap gap-2 justify-content-md-end">
                <button id="btnAbsenMasuk" class="btn btn-app-primary px-4">
                  <i class="fa-solid fa-arrow-right-to-bracket me-2"></i>Absen Masuk
                </button>
                <button id="btnAbsenPulang" class="btn btn-outline-app px-4" disabled>
                  <i class="fa-solid fa-arrow-right-from-bracket me-2"></i>Absen Pulang
                </button>
                <button class="btn btn-outline-secondary px-3" data-bs-toggle="modal" data-bs-target="#modalIzinSakit">
                  <i class="fa-regular fa-note-sticky me-2"></i>Ajukan Izin/Sakit
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- RIWAYAT ABSENSI -->
      <div class="app-card">
        <div class="card-header">
          <span><i class="fa-solid fa-table-list me-2 text-primary"></i>Riwayat Absensi Saya</span>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead>
                <tr>
                  <th>Tanggal</th>
                  <th>Jam Masuk</th>
                  <th>Jam Pulang</th>
                  <th>Status</th>
                  <th>Keterangan</th>
                </tr>
              </thead>
              <tbody id="historyTableBody">
                <tr><td colspan="5" class="text-center text-muted py-4">Memuat data...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- MODAL IZIN / SAKIT -->
  <div class="modal fade" id="modalIzinSakit" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="formIzinSakit">
          <div class="modal-header">
            <h5 class="modal-title"><i class="fa-regular fa-note-sticky me-2 text-primary"></i>Ajukan Izin / Sakit</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Tanggal</label>
              <input type="date" class="form-control" id="izinTanggal" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Status</label>
              <select class="form-select" id="izinStatus" required>
                <option value="Izin">Izin</option>
                <option value="Sakit">Sakit</option>
              </select>
            </div>
            <div class="mb-1">
              <label class="form-label">Keterangan (opsional)</label>
              <textarea class="form-control" id="izinKeterangan" rows="3" placeholder="Contoh: keperluan keluarga / demam tinggi"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Batal</button>
            <button type="submit" id="btnSubmitIzin" class="btn btn-app-primary">
              <i class="fa-solid fa-paper-plane me-2"></i>Kirim Pengajuan
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
